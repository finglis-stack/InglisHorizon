<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte - Portail Client Inglis Horizon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --primary: #111827;
            --primary-hover: #374151;
            --success: #059669;
            --error: #dc2626;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .split-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Hero Section */
        .hero-section {
            flex: 1.2;
            background: linear-gradient(rgba(17, 24, 39, 0.4), rgba(17, 24, 39, 0.6)), url('/assets/hero.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px;
            color: #ffffff;
            position: relative;
        }

        .hero-logo {
            position: absolute;
            top: 40px;
            left: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .hero-title {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
            max-width: 500px;
        }

        .hero-subtitle {
            font-size: 15px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.85);
            max-width: 440px;
        }

        /* Form Section */
        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            padding: 40px;
            border-left: 1px solid var(--border-color);
        }

        .card {
            width: 100%;
            max-width: 400px;
            padding: 20px 0;
            text-align: left;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            background-color: #f9fafb;
            color: var(--text-main);
            border-radius: 0;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: var(--primary);
            background-color: #ffffff;
        }

        .btn {
            width: 100%;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 0;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #d1d5db;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .link-text {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            text-decoration: none;
        }

        .link-text a {
            color: var(--text-main);
            font-weight: 600;
            text-decoration: underline;
        }

        .error-banner {
            background-color: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 16px;
            border-radius: 0;
            font-size: 13px;
            margin-bottom: 24px;
            line-height: 1.4;
            display: none;
        }

        .success-banner {
            background-color: #ecfdf5;
            border: 1px solid #a7f3d0;
            color: var(--success);
            padding: 16px;
            border-radius: 0;
            font-size: 13px;
            margin-bottom: 24px;
            line-height: 1.4;
            display: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 860px) {
            .split-container {
                flex-direction: column;
            }
            .hero-section {
                height: 240px;
                padding: 40px;
                justify-content: center;
            }
            .hero-logo {
                top: 30px;
                left: 40px;
            }
            .hero-title {
                font-size: 28px;
                margin-top: 40px;
            }
            .form-section {
                padding: 40px 20px;
                border-left: none;
            }
            .card {
                padding: 0;
            }
        }
    </style>
</head>
<body>

<div class="split-container">
    <!-- Hero Left Panel -->
    <div class="hero-section">
        <div class="hero-logo">
            Inglis Horizon
        </div>
        <h1 class="hero-title">Portail Client</h1>
        <p class="hero-subtitle">Rejoignez-nous et gérez facilement l'accès à vos comptes financiers.</p>
    </div>

    <!-- Form Right Panel -->
    <div class="form-section">
        <div class="card">
            <h2>Créer un compte</h2>
            <p class="subtitle">Remplissez les informations suivantes pour commencer.</p>

            <div id="error-box" class="error-banner"></div>
            <div id="success-box" class="success-banner"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required autocomplete="new-password">
                </div>
                <button type="submit" id="submit-btn" class="btn">
                    S'enregistrer
                </button>
            </form>

            <div class="link-text">
                Déjà inscrit ? <a href="/login">Se connecter</a>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('register-form');
    const errorBox = document.getElementById('error-box');
    const successBox = document.getElementById('success-box');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';
        successBox.style.display = 'none';
        submitBtn.disabled = true;
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<div class="spinner"></div> Inscription...';

        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.message || "Erreur d'inscription.");
            }

            successBox.textContent = "Inscription réussie ! Redirection vers la page de connexion...";
            successBox.style.display = 'block';
            form.reset();

            setTimeout(() => {
                window.location.href = '/login';
            }, 2000);
        } catch (err) {
            errorBox.textContent = err.message;
            errorBox.style.display = 'block';
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
